<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments - Etzan</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <script src="i18n.js?v=3"></script>
  <style>
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .badge {
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      display: inline-block;
    }

    @media (max-width: 768px) {
      /* Search + refresh row: stack */
      .dashboard-body > .card > div:first-child,
      div[style*="justify-content: space-between"] {
        flex-direction: column !important;
        align-items: stretch !important;
      }
      div[style*="max-width: 500px"] {
        max-width: 100% !important;
      }
    }
  </style>

</head>
<body>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="Etzan" class="sidebar-logo-img" /><span class="sidebar-logo-text" data-i18n="sidebar-logo">Etzan</span></div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><i class='bx bx-desktop'></i> <span data-i18n="nav-dashboard">Dashboard</span></a>
        <div class="nav-divider"></div>
        <a href="users.html" class="nav-item"><i class='bx bx-group'></i> <span data-i18n="nav-users">Users</span></a>
        <a href="assessments.html" class="nav-item"><i class='bx bx-book-open'></i> <span data-i18n="nav-assessments">Assessments</span></a>
        <a href="payments.html" class="nav-item active"><i class='bx bx-dollar-circle'></i> <span data-i18n="nav-payments">Payments</span></a>
        <div class="nav-divider"></div>
        <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i> <span data-i18n="nav-settings">Settings</span></a>
        <div class="nav-divider"></div>
        <a href="#" class="nav-item nav-logout" onclick="logout()"><i class='bx bx-log-out'></i> <span data-i18n="nav-logout">Logout</span></a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="btn-icon" id="toggleSidebar"><i class='bx bx-menu'></i></button>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="toggleLanguage" title="Switch Language"><span>عربي</span></button>
          <button class="btn-icon" id="toggleTheme"><i class='bx bx-moon'></i></button>
          <div class="user-profile">
            <div class="avatar"><i class='bx bx-user'></i></div>
          </div>
        </div>
      </header>

      <div class="dashboard-body">
        <div class="dashboard-header-info">
          <div class="breadcrumb"><strong data-i18n="nav-payments">Payments</strong> <span>|</span> <span data-i18n="payments-sub">Transaction Management</span></div>
          <div class="date-time-display" id="currentDateTime">--</div>
        </div>

        <div class="welcome-banner" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
          <div class="welcome-banner-text">
            <h1 data-i18n="payments-title">Payments Management</h1>
            <p data-i18n="payments-sub">View and track all user transactions and revenue</p>
          </div>
          <div class="banner-icon"><i class='bx bx-dollar-circle'></i></div>
        </div>

        <div class="card" style="background: var(--bg-surface); padding: 1.5rem; border-radius: 10px; border: 1px solid var(--border-color);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;">
            <h2 style="font-size: 1.1rem; font-weight: 600; margin: 0;" data-i18n="transaction-log">Transaction Log</h2>
            <div style="display: flex; gap: 0.75rem; flex: 1; max-width: 500px;">
              <div style="position: relative; flex: 1;">
                <i class='bx bx-search' style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" id="searchInput" placeholder="Search order ID, email, name..." style="width: 100%; padding: 8px 12px 8px 36px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-main);">
              </div>
              <button class="btn-icon" onclick="loadPayments()" style="background: var(--primary-color); color: white; border: none; width: 40px; height: 38px; border-radius: 6px; cursor: pointer;">
                <i class='bx bx-refresh'></i>
              </button>
            </div>
          </div>

          <div style="overflow-x: auto;">
            <table class="data-table" id="paymentsTable" style="width: 100%; border-collapse: collapse;">
              <thead>
                <tr>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-date">Date</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-user">User</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-ref">Order ID</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-type">Service</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-amount">Amount</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-status">Status</th>
                  <th style="padding: 12px; text-align: left; border-bottom: 2px solid var(--border-color); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase;" data-i18n="table-actions">Actions</th>
                </tr>
              </thead>
              <tbody id="paymentsTableBody">
                <!-- JS will populate rows -->
                <tr><td colspan="6" style="text-align:center; padding: 3rem; color: var(--text-muted);"><i class='bx bx-loader-alt bx-spin' style="font-size: 2rem; display: block; margin-bottom: 1rem;"></i>Loading payments...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>
  <!-- Payment Modal -->
  <div id="paymentModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(3px);">
    <div style="background:var(--bg-surface);border-radius:12px;padding:2.5rem;max-width:600px;width:95%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);">
      <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;background:var(--bg-body);border:1px solid var(--border-color);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;color:var(--text-muted);transition:all 0.2s;">×</button>
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border-color);padding-bottom:1rem;">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(92,109,250,0.1);color:var(--primary-color);display:flex;align-items:center;justify-content:center;font-size:1.5rem;"><i class='bx bx-receipt'></i></div>
        <h3 style="margin:0;font-size:1.25rem;font-weight:700;color:var(--text-main);" id="modalTitle">Payment Details</h3>
      </div>
      <pre id="modalContent" style="font-size:0.85rem;background:var(--bg-body);color:var(--text-main);padding:1.25rem;border-radius:8px;border:1px solid var(--border-color);overflow:auto;max-height:50vh;white-space:pre-wrap;font-family:monospace;"></pre>
      <div style="margin-top:1.5rem;display:flex;justify-content:flex-end;">
        <button onclick="closeModal()" class="btn-sm btn-info" style="padding:0.6rem 1.5rem;font-size:0.85rem;">Close</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
  <!-- Logic Scripts -->
  <script>
    let allPayments = [];

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      loadPayments();

      document.getElementById('searchInput').addEventListener('input', function(e) {
        renderTable(e.target.value);
      });
    });

    async function loadPayments() {
      const tbody = document.getElementById('paymentsTableBody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">Loading payments...</td></tr>';
      
      try {
        const response = await apiFetch('/admin/payments');
        if (!response) return;
        
        allPayments = await response.json();
        renderTable();
      } catch (err) {
        console.error('Failed to load payments:', err);
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: red;">Failed to load data. See console.</td></tr>';
      }
    }

    function renderTable(filterQuery = '') {
      const tbody = document.getElementById('paymentsTableBody');
      tbody.innerHTML = '';
      
      if (allPayments.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">No payment records found.</td></tr>`;
        return;
      }
      
      const q = filterQuery.toLowerCase();
      const filtered = allPayments.filter(p => 
        (p.user_email && p.user_email.toLowerCase().includes(q)) || 
        (p.user_name && p.user_name.toLowerCase().includes(q)) ||
        (p.order_id && p.order_id.toLowerCase().includes(q)) ||
        (p.session_id && p.session_id.toLowerCase().includes(q)) ||
        (p.service_type && p.service_type.toLowerCase().includes(q))
      );

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">No matches found.</td></tr>`;
        return;
      }

      filtered.forEach((p) => {
        const tr = document.createElement('tr');
        
        const dateStr = new Date(p.created_at).toLocaleString();
        const amountStr = `${p.amount} ${p.currency || 'EGP'}`;
        
        let statusBadge = '';
        if (p.status === 'SUCCESS') {
          statusBadge = `<span class="badge" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">SUCCESS</span>`;
        } else if (p.status === 'PENDING') {
          statusBadge = `<span class="badge" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">PENDING</span>`;
        } else {
          statusBadge = `<span class="badge" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">${p.status}</span>`;
        }
        
        let serviceBadgeClass = 'badge-primary';
        
        tr.innerHTML = `
          <td style="white-space: nowrap">${dateStr}</td>
          <td>
            <div style="font-weight: 500">${p.user_name || 'N/A'}</div>
            <div style="font-size: 0.8rem; color: var(--text-muted)">${p.user_email || 'N/A'}</div>
          </td>
          <td><code style="background: var(--bg-body); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem">${p.order_id}</code></td>
          <td><span class="badge ${serviceBadgeClass}">${p.service_type || 'Custom'}</span></td>
          <td style="font-weight: 600">${amountStr}</td>
          <td>${statusBadge}</td>
          <td>
            <button class="btn-sm btn-view" onclick="viewPayment('${p.id}')"><i class='bx bx-show'></i> <span data-i18n="action-view">View</span></button>
          </td>
        `;

        tbody.appendChild(tr);
      });
      if (window.applyTranslations) window.applyTranslations();
    }

    function viewPayment(paymentId) {
      const p = allPayments.find(x => x.id === paymentId);
      if(!p) return;
      document.getElementById('modalTitle').textContent = `Payment Details — ${p.order_id}`;
      document.getElementById('modalContent').textContent = JSON.stringify(p, null, 2);
      document.getElementById('paymentModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('paymentModal').style.display = 'none';
    }
  </script>
</body>
</html>
