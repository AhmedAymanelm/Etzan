<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Etzan</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="styles.css?v=4" />
  <script src="i18n.js?v=3"></script>
</head>
<body class="login-page">
  <div style="position: absolute; top: 1rem; right: 1rem; z-index: 100;">
    <button class="btn-icon" id="toggleLanguage" title="Switch Language" style="background: var(--bg-surface); border: 1px solid var(--border-color); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; color: var(--text-main); font-weight: 600;">
      <span data-i18n="switch-lang">عربي</span>
    </button>
  </div>

  <div class="login-card-wrapper">
    <div class="logo-badge">B</div>
    <div class="login-card">
      <h2 data-i18n="login-title">Login</h2>
      
      <form id="loginForm">
        <div class="form-group">
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required data-i18n="label-email" />
        </div>
        
        <div class="form-group">
          <input type="password" id="password" class="form-control" placeholder=".........." required data-i18n="label-password" />
        </div>
        
        <div class="login-options" style="justify-content: center;">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            <span data-i18n="remember-me">Remember Me</span>
          </label>
        </div>
        
        <button type="submit" class="btn btn-primary w-100" data-i18n="login-btn">LOGIN</button>
      </form>
      
    </div>
  </div>

  <script src="app.js?v=3"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitBtn = this.querySelector('button[type="submit"]');
      
      if (!email || !password) return;

      const lang = localStorage.getItem('dashboard_lang') || 'en';
      submitBtn.textContent = translations[lang]['login-loading'] || 'LOGGING IN...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${window.API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (response.ok) {
          const data = await response.json();
          // Store token
          localStorage.setItem('admin_token', data.access_token);
          window.location.href = 'dashboard.html';
        } else {
          const errData = await response.json();
          alert(errData.detail || translations[lang]['login-failed'] || 'Login failed! Check your credentials.');
        }
      } catch (err) {
        console.error('Login error:', err);
        alert('Server unreachable. Make sure backend is running.');
      } finally {
        const currentLang = localStorage.getItem('dashboard_lang') || 'en';
        submitBtn.textContent = translations[currentLang]['login-btn'] || 'LOGIN';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
