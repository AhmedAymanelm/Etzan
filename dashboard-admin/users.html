<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users - بيت الحياة</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="styles.css?v=5" />
  <script src="i18n.js?v=3"></script>
  <style>
    .table-card {
      background: var(--bg-surface);
      border-radius: 8px;
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    .data-table th {
      padding: 0.875rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .data-table td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--border-color);
      color: var(--text-main);
      vertical-align: middle;
    }

    .data-table tbody tr:hover {
      background: var(--bg-body);
    }

    .badge {
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      display: inline-block;
    }

    .badge-success {
      background: #d1fae5;
      color: #065f46;
    }

    .badge-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge-gray {
      background: #f3f4f6;
      color: #4b5563;
    }

    .table-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .search-box {
      position: relative;
      min-width: 260px;
    }

    .search-box i {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-box input {
      padding-left: 2.4rem;
      width: 100%;
    }

    .btn-sm {
      padding: 0.3rem 0.65rem;
      border-radius: 5px;
      border: 1px solid;
      font-size: 0.78rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-info {
      background: #dbeafe;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .btn-info:hover {
      background: #bfdbfe;
    }

    .btn-warn {
      background: #fef3c7;
      color: #92400e;
      border-color: #fde68a;
    }

    .btn-warn:hover {
      background: #fde68a;
    }

    .btn-del {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .btn-del:hover {
      background: #fecaca;
    }

    .actions-cell {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .avatar-sm {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary-color);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.8rem;
      margin-right: 0.5rem;
      font-weight: 600;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      background: var(--bg-surface);
      border-radius: 12px;
      padding: 2rem;
      width: 620px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .modal-close:hover {
      color: var(--text-main);
    }

    .user-detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin: 1rem 0;
    }

    .detail-field {
      background: var(--bg-body);
      border-radius: 6px;
      padding: 0.65rem 0.875rem;
    }

    .detail-field label {
      display: block;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
      text-transform: uppercase;
    }

    .detail-field span {
      font-size: 0.875rem;
      color: var(--text-main);
      font-weight: 500;
    }

    .assess-list {
      margin-top: 1rem;
    }

    .assess-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.875rem;
      border-radius: 6px;
      background: var(--bg-body);
      margin-bottom: 0.4rem;
      font-size: 0.825rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    .stats-row {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .search-box {
        min-width: 100%;
      }
      .table-controls {
        flex-direction: column;
        align-items: flex-start;
      }
      .user-detail-grid {
        grid-template-columns: 1fr !important;
      }
      .modal-box {
        padding: 1.25rem;
      }
    }

    /* ── Creative Alerts ── */
    .creative-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .creative-modal-overlay.show { display: flex; opacity: 1; }
    .creative-modal-box {
      background: var(--bg-surface);
      border-radius: 24px;
      width: 90%;
      max-width: 400px;
      padding: 2.5rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .creative-modal-overlay.show .creative-modal-box { transform: scale(1); }
    .creative-modal-icon {
      width: 84px; height: 84px;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border-radius: 20px;
      display: flex;
      align-items: center; justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1.5rem;
      transform: rotate(-5deg);
    }
    .creative-modal-title { font-size: 1.6rem; font-weight: 900; color: var(--text-main); margin-bottom: 0.8rem; letter-spacing: -0.03em; }
    .creative-modal-text { font-size: 1rem; color: #64748b; line-height: 1.6; margin-bottom: 2.5rem; }
    .creative-modal-actions { display: flex; gap: 1rem; }
    .creative-btn {
      flex: 1; padding: 0.8rem; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s;
    }
    .creative-btn-confirm { background: #ef4444; color: white; }
    .creative-btn-confirm:hover { background: #dc2626; box-shadow: 0 8px 15px rgba(239, 68, 68, 0.3); }
    .creative-btn-cancel { background: var(--bg-body); color: var(--text-muted); }
    .creative-btn-cancel:hover { background: #e2e8f0; }

    /* Toast */
    .creative-toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: white;
      border-left: 5px solid var(--primary-color);
      padding: 1rem 1.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      display: flex; align-items: center; gap: 1rem;
      z-index: 10000;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .creative-toast.show { transform: translateX(0); }
    .creative-toast-icon { font-size: 1.5rem; color: var(--primary-color); }
    .creative-toast-content { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
  </style>
</head>

<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><img src="logo.png" alt="بيت الحياة" class="sidebar-logo-img" /><span class="sidebar-logo-text" data-i18n="sidebar-logo">بيت الحياة</span></div>
      <nav class="nav-menu">
        <a href="dashboard.html" class="nav-item"><i class='bx bx-desktop'></i> <span
            data-i18n="nav-dashboard">Dashboard</span></a>
        <div class="nav-divider"></div>
        <a href="users.html" class="nav-item active"><i class='bx bx-group'></i> <span
            data-i18n="nav-users">Users</span></a>
        <a href="assessments.html" class="nav-item"><i class='bx bx-book-open'></i> <span
            data-i18n="nav-assessments">Assessments</span></a>
        <a href="payments.html" class="nav-item"><i class='bx bx-dollar-circle'></i> <span
            data-i18n="nav-payments">Payments</span></a>
        <div class="nav-divider"></div>
        <a href="settings.html" class="nav-item"><i class='bx bx-cog'></i> <span
            data-i18n="nav-settings">Settings</span></a>
        <div class="nav-divider"></div>
        <a href="#" class="nav-item nav-logout" onclick="logout()"><i class='bx bx-log-out'></i> <span
            data-i18n="nav-logout">Logout</span></a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="btn-icon" id="toggleSidebar"><i class='bx bx-menu'></i></button>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="toggleLanguage" title="Switch Language"><span>عربي</span></button>
          <button class="btn-icon" id="toggleTheme"><i class='bx bx-moon'></i></button>
          <div class="user-profile">
            <div class="avatar"><i class='bx bx-user'></i></div>
          </div>
        </div>
      </header>

      <div class="dashboard-body">
        <div class="dashboard-header-info">
          <div class="breadcrumb"><strong data-i18n="breadcrumb-users">Users</strong> <span>|</span> <span
              data-i18n="breadcrumb-mgmt">User Management</span></div>
          <div id="statsRow" class="stats-row">Loading...</div>
        </div>

        <div class="table-card">
          <div class="table-controls">
            <h2 style="font-size: 1.1rem; font-weight: 600;" data-i18n="users-title">All Users</h2>
            <div class="search-box">
              <i class='bx bx-search'></i>
              <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email..."
                oninput="filterUsers()" data-i18n="users-search-placeholder">
            </div>
          </div>

          <table class="data-table">
            <thead>
              <tr>
                <th data-i18n="table-user">User</th>
                <th data-i18n="table-email">Email</th>
                <th data-i18n="table-birth">Birth Info</th>
                <th data-i18n="table-assessments">Assessments</th>
                <th>Subscription</th>
                <th data-i18n="table-joined">Joined</th>
                <th data-i18n="table-status">Status</th>
                <th data-i18n="table-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="7" class="empty-state"><i class='bx bx-loader-alt bx-spin'></i>Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- User Details Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()"><i class='bx bx-x'></i></button>
      <h3 id="modalUserName" style="font-size: 1.1rem; margin-bottom: 0.25rem;"></h3>
      <p id="modalUserEmail" style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1rem;"></p>

      <div class="user-detail-grid" id="modalDetails"></div>

      <div class="assess-list">
        <h4 style="font-size: 0.875rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted);">ASSESSMENTS
          HISTORY</h4>
        <div id="modalAssessments"></div>
      </div>
    </div>
  </div>

  <!-- ── Creative Modal Overlay ── -->
  <div class="creative-modal-overlay" id="creativeConfirmModal">
    <div class="creative-modal-box">
      <div class="creative-modal-icon"><i class='bx bx-error-circle'></i></div>
      <div class="creative-modal-title" id="ccmTitle">Are you sure?</div>
      <div class="creative-modal-text" id="ccmText">This action cannot be undone.</div>
      <div class="creative-modal-actions">
        <button class="creative-btn creative-btn-cancel" onclick="closeCreativeConfirm()">Cancel</button>
        <button class="creative-btn creative-btn-confirm" id="ccmConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <div class="creative-toast" id="creativeToast">
    <div class="creative-toast-icon"><i class='bx bxs-check-circle'></i></div>
    <div class="creative-toast-content" id="ctText">Action successful</div>
  </div>

  <script src="app.js?v=4"></script>
  <script>
    let allUsers = [];

    document.addEventListener('DOMContentLoaded', () => {
      requireAuth();
      fetchUsers();
    });

    const typeBadgeColors = {
      psychology: '#e0e7ff|#3730a3',
      neuroscience: '#dcfce7|#166534',
      letter: '#fef3c7|#92400e',
      astrology: '#fae8ff|#86198f',
      comprehensive: '#ffedd5|#9a3412'
    };

    const getTypeBadge = (type) => {
      const colors = typeBadgeColors[type] || '#f3f4f6|#374151';
      const [bg, color] = colors.split('|');
      return `<span style="background:${bg};color:${color};padding:0.15rem 0.5rem;border-radius:999px;font-size:0.72rem;font-weight:600;">${type}</span>`;
    };

    async function fetchUsers() {
      const tbody = document.getElementById('usersTableBody');
      try {
        const res = await apiFetch('/admin/users');
        if (!res) return;
        allUsers = await res.json();
        document.getElementById('statsRow').textContent = `${allUsers.length} total users · ${allUsers.filter(u => u.is_active).length} active`;
        renderUsers(allUsers);
        if (window.applyTranslations) window.applyTranslations();
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class='bx bx-error'></i>Failed to load users.</td></tr>`;
      }
    }

    function filterUsers() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allUsers.filter(u =>
        `${u.fullname} ${u.email}`.toLowerCase().includes(q)
      );
      renderUsers(filtered);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty-state"><i class='bx bx-ghost'></i>No users found.</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => {
        const name = u.fullname || 'N/A';
        const initials = u.fullname ? u.fullname.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '?';
        const statusBadge = u.is_active
          ? `<span class="badge badge-success">Active</span>`
          : `<span class="badge badge-danger">Inactive</span>`;
        const date = u.created_at ? new Date(u.created_at).toLocaleDateString() : '—';
        const birthInfo = [u.date_of_birth, u.place_of_birth].filter(Boolean).join(' · ') || '—';
        
        let subBadge = '';
        if (u.has_active_subscription) {
            subBadge = '<span class="badge badge-success" style="background:#dcfce7;color:#166534;"><i class="bx bx-check-circle"></i> Subscribed</span>';
        } else if (!u.free_trial_used) {
            subBadge = '<span class="badge" style="background:#fef3c7;color:#92400e;"><i class="bx bx-gift"></i> Trial Avail</span>';
        } else {
            subBadge = '<span class="badge badge-danger" style="background:#fee2e2;color:#991b1b;"><i class="bx bx-x-circle"></i> No Sub</span>';
        }

        return `
          <tr>
            <td><div style="display:flex;align-items:center;"><div class="avatar-sm">${initials || '?'}</div><strong>${name}</strong></div></td>
            <td>${u.email}</td>
            <td style="font-size:0.8rem;color:var(--text-muted);">${birthInfo}</td>
            <td><span class="badge badge-gray">${u.assessment_count}</span></td>
            <td>${subBadge}</td>
            <td style="font-size:0.8rem;color:var(--text-muted);">${date}</td>
            <td>${statusBadge}</td>
            <td>
              <div class="actions-cell">
                <button class="btn-sm btn-info" onclick="viewUser('${u.id}')" title="View"><i class='bx bx-show'></i></button>
                <button class="btn-sm btn-info" style="background:#d1fae5;color:#065f46;border-color:#a7f3d0;" onclick="grantSub('${u.id}', '${name}')" title="Grant Subscription"><i class='bx bx-star'></i></button>
                <button class="btn-sm btn-warn" onclick="resetTrial('${u.id}', '${name}')" title="Reset Trial"><i class='bx bx-reset'></i></button>
                ${u.is_active
            ? `<button class="btn-sm btn-warn" onclick="toggleStatus('${u.id}', '${name}')" title="Block"><i class='bx bx-block'></i></button>`
            : `<button class="btn-sm btn-info" onclick="toggleStatus('${u.id}', '${name}')" title="Activate"><i class='bx bx-check'></i></button>`
          }
                <button class="btn-sm btn-del" onclick="deleteUser('${u.id}', '${name}')" title="Delete"><i class='bx bx-trash'></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      if (window.applyTranslations) window.applyTranslations();
    }

    async function viewUser(userId) {
      const res = await apiFetch(`/admin/users/${userId}/details`);
      if (!res) return;
      const u = await res.json();

      document.getElementById('modalUserName').textContent = u.fullname;
      document.getElementById('modalUserEmail').textContent = u.email;

      document.getElementById('modalDetails').innerHTML = `
        <div class="detail-field"><label>Date of Birth</label><span>${u.date_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Place of Birth</label><span>${u.place_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Time of Birth</label><span>${u.time_of_birth || '—'}</span></div>
        <div class="detail-field"><label>Status</label><span>${u.is_active ? '✅ Active' : '🔴 Inactive'}</span></div>
        <div class="detail-field"><label>Verified</label><span>${u.is_verified ? '✅ Yes' : '❌ No'}</span></div>
        <div class="detail-field"><label>Joined</label><span>${u.created_at ? new Date(u.created_at).toLocaleDateString() : '—'}</span></div>
      `;

      const assessEl = document.getElementById('modalAssessments');
      if (!u.assessments || !u.assessments.length) {
        assessEl.innerHTML = `<p style="color:var(--text-muted);font-size:0.85rem;">No assessments yet.</p>`;
      } else {
        assessEl.innerHTML = u.assessments.map(a => `
          <div class="assess-item">
            <div>${getTypeBadge(a.type)} <span style="margin-left:0.5rem;color:var(--text-muted);font-size:0.8rem;">${new Date(a.created_at).toLocaleDateString()}</span></div>
            <div></div>
          </div>
        `).join('');
      }

      document.getElementById('userModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('userModal').classList.remove('show');
    }

    document.getElementById('userModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    async function grantSub(userId, name) {
      showCreativeConfirm('Grant Subscription?', `Grant a free 30-day subscription to ${name}?`, async () => {
        const res = await apiFetch(`/admin/users/${userId}/grant-subscription`, { method: 'POST' });
        if (res && res.ok) {
          showCreativeToast('Subscription granted successfully.');
          fetchUsers();
        } else {
          showCreativeToast('Failed to grant subscription.', 'bx-error-circle');
        }
      });
    }

    async function resetTrial(userId, name) {
      showCreativeConfirm('Reset Trial?', `Reset the free trial for ${name}?`, async () => {
        const res = await apiFetch(`/admin/users/${userId}/reset-free-trial`, { method: 'POST' });
        if (res && res.ok) {
          showCreativeToast('Free trial reset!');
          fetchUsers();
        } else {
          showCreativeToast('Failed to reset trial.', 'bx-error-circle');
        }
      });
    }

    async function toggleStatus(userId, name) {
      showCreativeConfirm('Toggle Status?', `Are you sure you want to toggle the active status for ${name}?`, async () => {
        const res = await apiFetch(`/admin/users/${userId}/toggle-status`, { method: 'POST' });
        if (res && res.ok) {
          showCreativeToast('Status updated!');
          fetchUsers();
        } else {
          showCreativeToast('Failed to update status.', 'bx-error-circle');
        }
      });
    }

    async function deleteUser(userId, name) {
      showCreativeConfirm('Delete User?', `Are you sure you want to delete user "${name}" and ALL their data? This action is permanent.`, async () => {
        const res = await apiFetch(`/admin/users/${userId}`, { method: 'DELETE' });
        if (res && res.ok) {
          showCreativeToast('User deleted successfully.');
          fetchUsers();
        } else {
          showCreativeToast('Failed to delete user.', 'bx-error-circle');
        }
      });
    }

    // ── Creative UI Helpers ──────────────────────────────────────────────────
    let _onConfirmCallback = null;
    function showCreativeConfirm(title, text, callback) {
      document.getElementById('ccmTitle').textContent = title;
      document.getElementById('ccmText').textContent = text;
      _onConfirmCallback = callback;
      const modal = document.getElementById('creativeConfirmModal');
      modal.classList.add('show');
      
      const btn = document.getElementById('ccmConfirmBtn');
      // Remove old listeners
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      newBtn.addEventListener('click', () => {
        closeCreativeConfirm();
        if (_onConfirmCallback) _onConfirmCallback();
      });
    }

    function closeCreativeConfirm() {
      document.getElementById('creativeConfirmModal').classList.remove('show');
    }

    function showCreativeToast(text, icon = 'bxs-check-circle') {
      const toast = document.getElementById('creativeToast');
      document.getElementById('ctText').textContent = text;
      toast.querySelector('i').className = 'bx ' + icon;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3500);
    }
  </script>
</body>
